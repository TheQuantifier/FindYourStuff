<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Log In | Find Your Stuff</title>
    <link rel="icon" type="image/png" href="./images/logo.png" />
    <link rel="stylesheet" href="./styles/main.css" />
  </head>
  <body>
    <div class="shell">
      <header class="site-header">
        <a class="brand" href="./index.html">
          <img class="brand-logo" src="./images/logo.png" alt="Find Your Stuff logo" />
          <span class="brand-copy">
            <span class="brand-title-group">
              <span class="brand-name">Find Your Stuff</span>
              <span class="brand-tagline">A calmer interface for finding things</span>
            </span>
          </span>
        </a>
        <nav class="header-links">
          <a class="ghost-link" href="./register.html">Register</a>
        </nav>
      </header>

      <main class="auth-grid">
        <section class="panel auth-copy">
          <p class="eyebrow">Sign in</p>
          <h1>Return to your saved item memory.</h1>
          <p>Sign in with your email and password. After auth succeeds, the app sends you straight into chat.</p>
        </section>
        <section class="panel auth-card">
          <form class="auth-form" data-auth-form="login">
            <label>Email<input type="email" name="email" required /></label>
            <label>Password<input type="password" name="password" required /></label>
            <button class="primary-button" type="submit">Log in</button>
            <p class="error-text" data-error></p>
          </form>
        </section>
      </main>
    </div>

    <script type="module" src="./scripts/auth.js"></script>
  </body>
  </html>
